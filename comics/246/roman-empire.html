    <style>
css-title { 
  background: #ffd;
  display: flex;
  
  span {
    font-size: 0.8em;
    position: relative;
  }
}

css-person:not([character="al"]) {
  .eyebrow {
    scale: 1 1.125;
  }
}

css-person, .css-person {
  .head {
    .neck {
      border-bottom-color: var(--skin-color);
    }
  }
  .body {
    .arm {
      &::after,
      &::before {
        box-shadow: none;
        background: var(--skin);
        border-inline: 0.4em solid;
        box-sizing: content-box;
      }

      &::before {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%) !important;
        background: 
          linear-gradient(45deg, #fff0 0 0.25em, #000 0 0.5em, #fff0 0) 0 0 / 100% 0.6em,
          linear-gradient(#e33 50%, #000 0 calc(50% + 0.4em), #0000 0),
          var(--skin-color)
          ;
      }

      & ~ & {
        left: -10%;
      }
    }
    .chest {
      border: 0.4em solid;
      background: 
        radial-gradient(250% 80% at 53% 0%, var(--skin-color) 0 6%, #000 0 calc(6% + 0.5em), #e33 0 22%, #0000 0),
        linear-gradient(45deg, #fff0 0 0.25em, #000 0 0.5em, #fff0 0) 0 0 / 100% 0.6em,
        repeating-radial-gradient(200% 50% at 50% 5%, #000 0 0.6em, gray calc(0.6em + 1px) 25%),
        var(--skin);
    }
  }

  .extra {
    z-index: 9999;

    &.pad {
      scale: -0.5 1;
      width: 30%;
      height: 40%;
      background: 
        linear-gradient(90deg, gray 30%, #0000 0) no-repeat,
        radial-gradient(75% 40% at 0 100%, gray calc(100% - 1px), #0000) no-repeat;
      border-radius: 100% / 10%;
      filter:
        drop-shadow(-0.7em 0)
        drop-shadow(0.7em 0)
        drop-shadow(0 0.4em 0)
        drop-shadow(0 -0.2em 0);
      transform: skewY(10deg);
      top: 13%;
      left: 53.5%;

      & ~ & {
        background: 
        linear-gradient(45deg, #fff0 0 0.25em, #000 0 0.5em, #fff0 0) 0.035em 0 / 100% 0.6em repeat-y,
        linear-gradient(90deg, gray 30%, #0000 0) no-repeat,
        radial-gradient(75% 40% at 0 100%, gray calc(100% - 1px), #0000) no-repeat;
        filter:
        drop-shadow(-0.4em 0)
        drop-shadow(0.4em 0)
        drop-shadow(0 0.4em 0)
        drop-shadow(0 -0.2em 0);
        scale: 1 1;
        z-index: 999;
        left: 24.75%;
      }
    }

    &.hat {
      width: 55%;
      height: 20%;
      background: 
        linear-gradient(45deg, #fff0 0 0.25em, #000 0 0.5em, #fff0 0) 0 0 / 100% 0.6em,
        gray;
      border-radius: 6em 6em 0 0;
      left: 49%;
      top: 5%;
      translate: -50% -50%;
      border: 0.4em solid;
      rotate: -3deg;
      scale: 1;
      
      &::after {
        height: 35%;
        aspect-ratio: 1;
        border: 0.4em solid;
        background: gray;
        content: "";
        border-radius: 100% / 20% 20% 0 0;
        left: 50%;
        translate: -50% -95%;
        rotate: -2deg;
      }

      &::before {
        content: ""; /* "SPQR"; */
        display: grid;
        place-items: center;
        padding-inline-start: 1em;
        width: 110%;
        height: 60%;
        border: 0.4em solid;
        background: gray;
        box-shadow: inset 0 0 0 0.5em  gold;
        border-radius: 50% / 100% 100% 20% 10%;
        bottom: -10%;
      }
    }

    &.shoulder-pad {
      width: 30%;
      height: 13%;
      background: 
/*         linear-gradient(45deg, #fff0 0 0.25em, #000 0 0.5em, #fff0 0) 0 0 / 100% 0.6em, */
        gray;
      border: 0.4em solid;
      border-radius: 100% / 30% 40% 50% 100%;
      top: 58%;
      left: 17%;
      rotate: -14deg;

      & ~ & {
        scale: -0.9 0.95;
        left: 52%;
        rotate: 14deg;
      }
    }

  }
}

css-panel:nth-child(4) {
  css-person {
    rotate: 2deg;
    
    &[character="al"] {
      rotate: -2deg;
    }
  }
  css-speech:nth-child(1) {    
    &::before {
      transform: skew(-7deg);
      left: 70%;
    }
  }
}

css-panel:nth-child(5) {
  css-person:not([character="al"]) {
    rotate: 2deg;
    .head {
      .face {
        .eye {
          left: 75% !important;
          
          & ~ & {
            left: 37% !important;
          }
        }
      }
    }
  }
}
